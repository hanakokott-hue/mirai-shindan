<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アナタノミライハ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #FFFFFF;
  --surface: #F8F8F8;
  --surface2: #F0F0F0;
  --border: #000000;
  --ink: #FFFFFF;
  --ink-muted: #888888;
  --ink-dim: #BBBBBB;
  --accent: #0504AA;
  --accent-soft: rgba(5,4,170,0.08);
  --accent-glow: rgba(5,4,170,0.04);
  --red: #CC0000;
  --green: #006600;
  --blue: #0504AA;
  --radius: 16px;
  --radius-sm: 10px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:#1a1a1a;font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── Subtle grid texture ── */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 80px}

/* ── Screens ── */
.screen{display:none;width:100%;max-width:620px}
.screen.active{display:block;animation:up 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

/* ════════════════════
   TOP SCREEN
════════════════════ */
#screen-top{text-align:center}

.top-wordmark{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:6px;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:48px;
  opacity:0.8;
}

.top-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(52px,12vw,88px);
  line-height:0.95;
  color:var(--ink);
  margin-bottom:8px;
  letter-spacing:-2px;
}

.top-title-sub{
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,5vw,36px);
  font-style:italic;
  color:var(--accent);
  margin-bottom:40px;
  letter-spacing:-0.5px;
}

.top-desc{
  font-size:14px;
  line-height:2;
  color:var(--ink-muted);
  font-weight:300;
  max-width:420px;
  margin:0 auto 48px;
}

.top-tags{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:52px;
}

.tag{
  padding:6px 16px;
  border:1px solid var(--border);
  border-radius:100px;
  font-size:11px;
  color:var(--ink-muted);
  font-family:'DM Mono',monospace;
  letter-spacing:1px;
}

.btn-primary{
  display:inline-flex;
  align-items:center;
  gap:12px;
  padding:18px 48px;
  background:var(--accent);
  color:var(--bg);
  border:none;
  border-radius:100px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.5px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,169,110,0.3)}
.btn-primary:active{transform:translateY(0)}

/* ════════════════════
   STANCE SCREEN
════════════════════ */
#screen-stance{text-align:center}

.stance-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(47px,8vw,65px);
  margin-bottom:12px;
}

.stance-sub{
  font-size:13px;
  color:var(--ink-muted);
  margin-bottom:40px;
  font-weight:300;
}

.stance-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:0;
}

.stance-btn{
  display:flex;
  align-items:center;
  gap:20px;
  padding:24px 28px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  text-align:left;
  transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.stance-btn:hover{border-color:var(--accent);background:var(--accent-soft)}

.stance-icon{
  width:48px;height:48px;
  border-radius:12px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

.stance-icon svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.stance-label{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:3px}
.stance-note{font-size:12px;color:var(--ink-muted);font-weight:300}

/* ════════════════════
   TARGET SCREEN
════════════════════ */
#screen-target{}

.target-header{text-align:center;margin-bottom:32px}
.target-title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,32px);margin-bottom:8px}
.target-sub{font-size:13px;color:var(--ink-muted);font-weight:300}

.target-section{margin-bottom:24px}
.target-section-label{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  color:var(--ink-dim);
  text-transform:uppercase;
  margin-bottom:12px;
  padding-left:4px;
}

.target-grid{display:flex;flex-direction:column;gap:10px}

.target-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 24px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;
  text-align:left;
  transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.target-btn:hover{border-color:var(--accent);background:var(--accent-soft)}

.target-text{font-size:15px;font-weight:500;color:var(--ink);line-height:1.5}
.target-arrow{color:var(--accent);font-size:18px;flex-shrink:0;margin-left:16px}

/* ════════════════════
   QUIZ SCREEN
════════════════════ */
#screen-quiz{}

.quiz-nav{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:28px;
}

.q-num{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:2px;
  color:var(--accent);
  white-space:nowrap;
  background:var(--accent-soft);
  padding:4px 12px;
  border-radius:100px;
}

.prog-track{flex:1;height:2px;background:var(--border);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:100px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}

.q-frac{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-dim);white-space:nowrap}

.quiz-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:40px 36px 32px;
  position:relative;
  overflow:hidden;
}
.quiz-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);
}

.q-cat{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  color:var(--ink-dim);
  text-transform:uppercase;
  margin-bottom:20px;
}

.q-text{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,3.5vw,22px);
  line-height:1.7;
  color:var(--ink);
  margin-bottom:32px;
  font-weight:400;
}

.opts{display:flex;flex-direction:column;gap:10px}

.opt{
  display:flex;
  align-items:flex-start;
  gap:14px;
  padding:16px 18px;
  background:var(--bg);
  border:1px solid transparent;
  border-radius:var(--radius-sm);
  cursor:pointer;
  text-align:left;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:14px;
  color:var(--ink-muted);
  line-height:1.6;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.opt:hover{border-color:var(--border);color:var(--ink);background:var(--surface2)}
.opt.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--ink)}

.opt-k{
  flex-shrink:0;
  width:24px;height:24px;
  border-radius:6px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--ink-dim);
  transition:all 0.15s;
  margin-top:1px;
}
.opt.sel .opt-k{background:var(--accent);border-color:var(--accent);color:var(--bg)}

.quiz-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:20px;
}

.btn-back{
  background:none;border:none;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:13px;color:var(--ink-dim);
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  padding:8px 0;transition:color 0.15s;
}
.btn-back:hover{color:var(--ink-muted)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.btn-next{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;
  background:var(--accent);color:var(--bg);
  border:none;border-radius:100px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:14px;font-weight:700;
  cursor:pointer;
  opacity:0.25;pointer-events:none;
  transition:all 0.2s;
}
.btn-next.ready{opacity:1;pointer-events:auto}
.btn-next.ready:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,169,110,0.3)}
.btn-next svg{width:13px;height:13px;stroke:var(--bg);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ════════════════════
   LOADING SCREEN
════════════════════ */
#screen-loading{text-align:center;padding:60px 0}

.loader-wrap{position:relative;width:64px;height:64px;margin:0 auto 36px}
.loader-ring{
  width:64px;height:64px;
  border:1.5px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.load-title{
  font-family:'Playfair Display',serif;
  font-size:26px;
  color:var(--ink);
  margin-bottom:12px;
}
.load-sub{
  font-size:13px;
  color:var(--ink-muted);
  font-weight:300;
  transition:opacity 0.3s;
  font-family:'DM Mono',monospace;
  letter-spacing:1px;
}

/* ════════════════════
   INTERVIEW SCREEN
════════════════════ */
#screen-interview{
  display:none;
  width:100%;
  max-width:680px;
}
#screen-interview.active{display:flex;flex-direction:column;height:100vh;padding:0}

.iv-header{
  padding:24px 32px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:16px;
  flex-shrink:0;
}

.iv-avatar{
  width:40px;height:40px;
  background:var(--accent-soft);
  border:1px solid var(--accent);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.iv-avatar svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.iv-info{}
.iv-name{font-size:14px;font-weight:700;color:var(--ink)}
.iv-status{font-size:11px;color:var(--green);font-family:'DM Mono',monospace;letter-spacing:1px}

.iv-messages{
  flex:1;
  overflow-y:auto;
  padding:32px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

.iv-messages::-webkit-scrollbar{width:4px}
.iv-messages::-webkit-scrollbar-track{background:transparent}
.iv-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:100px}

.msg{display:flex;gap:14px;animation:msgIn 0.4s cubic-bezier(0.22,1,0.36,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.msg-ai{align-items:flex-start}
.msg-user{align-items:flex-start;flex-direction:row-reverse}

.msg-avatar{
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  margin-top:2px;
}
.msg-ai .msg-avatar{background:var(--accent-soft);border:1px solid var(--accent)}
.msg-user .msg-avatar{background:var(--surface2);border:1px solid var(--border)}
.msg-avatar svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.msg-user .msg-avatar svg{stroke:var(--ink-muted)}

.msg-bubble{
  max-width:80%;
  padding:16px 20px;
  border-radius:16px;
  font-size:14px;
  line-height:1.8;
  font-weight:300;
}
.msg-ai .msg-bubble{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--ink);
  border-top-left-radius:4px;
}
.msg-user .msg-bubble{
  background:var(--accent-soft);
  border:1px solid rgba(200,169,110,0.2);
  color:var(--ink);
  border-top-right-radius:4px;
}

.msg-typing{
  display:flex;
  gap:4px;
  padding:16px 20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  border-top-left-radius:4px;
  width:fit-content;
}
.typing-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--ink-dim);
  animation:typing 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-4px);opacity:1}}

.iv-input-area{
  padding:20px 32px 32px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}

.iv-input-wrap{
  display:flex;
  gap:12px;
  align-items:flex-end;
}

.iv-textarea{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 18px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:14px;
  color:var(--ink);
  resize:none;
  min-height:52px;
  max-height:160px;
  line-height:1.6;
  outline:none;
  transition:border-color 0.2s;
}
.iv-textarea:focus{border-color:var(--accent)}
.iv-textarea::placeholder{color:var(--ink-dim)}

.iv-send{
  width:48px;height:48px;
  background:var(--accent);
  border:none;border-radius:12px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all 0.2s;
}
.iv-send:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,169,110,0.3)}
.iv-send:disabled{opacity:0.3;pointer-events:none}
.iv-send svg{width:18px;height:18px;stroke:var(--bg);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

.iv-hint{
  font-size:11px;
  color:var(--ink-dim);
  font-family:'DM Mono',monospace;
  letter-spacing:1px;
  margin-top:10px;
  text-align:center;
}

/* ════════════════════
   RESULT SCREEN
════════════════════ */
#screen-result{padding-bottom:40px}

.result-top{text-align:center;margin-bottom:36px}
.result-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 16px;
  background:rgba(110,200,150,0.12);
  border:1px solid rgba(110,200,150,0.2);
  border-radius:100px;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:2px;
  color:var(--green);
  text-transform:uppercase;
  margin-bottom:16px;
}
.result-title{font-family:'Playfair Display',serif;font-size:clamp(47px,10vw,68px);line-height:1.2;color:var(--ink);margin-bottom:10px}
.result-sub{font-size:14px;color:var(--ink-muted);line-height:1.7;font-weight:300}

.rblock{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:28px 32px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.rblock::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:2px;
}
.rblock.type-p::before{background:var(--accent)}
.rblock.type-b::before{background:var(--blue)}
.rblock.type-g::before{background:var(--green)}
.rblock.type-o::before{background:var(--red)}

.rblock-label{
  display:flex;align-items:center;gap:8px;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:3px;
  text-transform:uppercase;
  color:var(--ink-dim);
  margin-bottom:20px;
}
.rl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-p{background:var(--accent)}.dot-b{background:var(--blue)}.dot-g{background:var(--green)}.dot-o{background:var(--red)}

.analysis{font-size:15px;line-height:2;color:#C8C4BE;font-weight:300}

.traits{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.trait{
  padding:5px 16px;
  border:1px solid rgba(200,169,110,0.3);
  border-radius:100px;
  font-size:12px;
  color:var(--accent);
  font-family:'DM Mono',monospace;
  letter-spacing:0.5px;
}

.career-list{display:flex;flex-direction:column;gap:12px}
.career-row{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;
  background:var(--bg);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
}
.career-num{
  font-family:'Playfair Display',serif;
  font-size:22px;color:var(--ink-dim);
  width:24px;text-align:center;flex-shrink:0;
}
.career-body{flex:1;min-width:0}
.career-name{font-size:15px;font-weight:700;color:var(--ink)}
.career-note{font-size:12px;color:var(--ink-muted);margin-top:3px;line-height:1.4;font-weight:300}
.career-pct{font-size:20px;font-weight:700;color:var(--accent);flex-shrink:0;font-family:'DM Mono',monospace}

.uni-list{display:flex;flex-direction:column;gap:10px}
.uni-row{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;
  background:var(--bg);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
}
.uni-icon{
  width:36px;height:36px;
  background:rgba(110,200,150,0.1);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.uni-body{flex:1}
.uni-name{font-size:14px;font-weight:700;color:var(--ink)}
.uni-dept{font-size:12px;color:var(--ink-muted);margin-top:3px;line-height:1.5;font-weight:300}

.advice-box{
  background:linear-gradient(135deg,rgba(200,169,110,0.08),rgba(110,150,200,0.08));
  border-radius:var(--radius-sm);
  padding:22px;
  font-size:15px;line-height:1.95;
  color:#C8C4BE;font-weight:300;
}

.btn-interview{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px;
  background:var(--accent);
  border:none;border-radius:100px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--bg);
  cursor:pointer;
  margin-bottom:12px;
  transition:all 0.2s;
}
.btn-interview:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,169,110,0.3)}

.btn-retry{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;
  background:none;
  border:1px solid var(--border);
  border-radius:100px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:14px;color:var(--ink-muted);
  cursor:pointer;transition:all 0.2s;
}
.btn-retry:hover{border-color:var(--ink-muted);color:var(--ink)}
.btn-retry svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.error-box{
  background:rgba(200,110,110,0.1);
  border:1px solid rgba(200,110,110,0.2);
  border-radius:var(--radius-sm);
  padding:18px 20px;
  font-size:14px;color:var(--red);
  line-height:1.7;margin-bottom:16px;
}

@media(max-width:480px){
  .quiz-card{padding:28px 20px 24px}
  .rblock{padding:22px 20px}
  .iv-messages{padding:20px}
  .iv-header{padding:16px 20px}

<script>

function checkPassword() {
  const input = document.getElementById('pw-input').value.trim().toUpperCase();
  const correct = 'MIRAI SHINDAN';
  if (input === correct) {
    show('screen-top');
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
    setTimeout(() => {
      document.getElementById('pw-error').textContent = '';

  }
}

/* ═══════════════════════════════

function getQuestions(stance, target) {
  const s = stance;

  const place = {
    work: s === 'adult' ? '職場' : s === 'university' ? 'バイト・インターン先' : '部活・委員会',

    chance: s === 'adult' ? '3日間限定応募の天職を見つけた' : s === 'university' ? '3日間限定のインターンを見つけた' : '推しのライブチケットが偶然当たった',
    duty: s === 'adult' ? '今は引き継ぎの最中' : s === 'university' ? '今は引き継ぎの最中' : '今は新入生への指導が残っている',

    success: s === 'adult' ? '頑張ったプロジェクトが成功した' : s === 'university' ? '頑張ったグループ発表がうまくいった' : '頑張った文化祭・体育祭が大成功した',
    stopped: s === 'adult' ? '仕事・プロジェクト' : s === 'university' ? 'バイト・サークル・勉強' : '部活・習い事・勉強',
    guide: s === 'adult' ? '部下' : s === 'university' ? 'チームメンバー' : '後輩',
    sameop: s === 'adult' ? 'グループ作業で、自分と全く同じ意見の人がいた' : s === 'university' ? 'グループ発表の準備中、自分と全く同じ意見の人がいた' : 'クラス目標決めの際、自分と全く同じ意見の人がいた',

  const all = [
    // A1 好き・興味
    { cat:'A1 / 好き・興味', q:'何もしなくていい自由な時間が突然できた。気づいたらあなたは何をしていますか？', opts:[

      '気づいたら本や記事を読んでいた。活字に自然と手が伸びる',
      '気づいたら計画を立てていた。次にやることを考えるのがなぜか楽しい',
    ], multi: true },

    // A3 創造・独自性
    { cat:'A3 / 創造・独自性', q:`${place.sameop}。どう感じる？`, opts:[
      '心強い、一緒に進めやすい',
      '嬉しいけど、もっといろんな意見が出て欲しかった',
      '同じ結論でも、自分なりの角度を付け足したくなった',
      '安心する',
    ]},

    // A4 貢献・還元
    { cat:'A4 / 貢献・還元', q:'友達に何かを教えたあと、どう感じる？', opts:[
      '嬉しい、またいつでも聞いてと伝えた',
      '役に立てて良かったと思った',
      'よかったけど、何度も教えるのは違うかなと思う',
      '相手が理解できた瞬間が一番気持ちよかった',
    ]},

    // A5 存在意義
    { cat:'A5 / 存在意義', q:`${place.success}。一番嬉しかった瞬間は？`, opts:[

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-interview').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';

  if (id === 'screen-interview') {
    document.getElementById('shell').style.display = 'none';
    document.getElementById('screen-interview').style.display = 'flex';
    return;
  }
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showStance() { show('screen-stance'); }

function setStance(s) {
  stance = s;
  renderTargets();
  show('screen-target');
}

function renderTargets() {
  const career = document.getElementById('target-career');
  const school = document.getElementById('target-school');
  career.innerHTML = '';
  school.innerHTML = '';

  TARGETS.career.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'target-btn';
    btn.innerHTML = `<span class="target-text">${t.label}</span><span class="target-arrow">→</span>`;
    btn.onclick = () => startQuiz(t.id);
    career.appendChild(btn);
  });

  TARGETS.school.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'target-btn';
    btn.innerHTML = `<span class="target-text">${t.label}</span><span class="target-arrow">→</span>`;
    btn.onclick = () => startQuiz(t.id);
    school.appendChild(btn);
  });
}

═══════════════════════════════ */
let questions = [];

function startQuiz(t) {
  target = t;
  questions = getQuestions(stance, target);
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  renderQ();
  show('screen-quiz');
}

function renderQ() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round(((currentQ + 1) / total) * 100);

  document.getElementById('q-num').textContent = `Q ${currentQ + 1}`;
  document.getElementById('q-frac').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('btn-back').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';

  if (q.free) {
    const ta = document.createElement('textarea');
    ta.style.cssText = 'width:100%;background:#fff;border:1.5px solid #000;border-radius:10px;padding:14px 16px;font-family:\'Zen Kaku Gothic New\',sans-serif;font-size:14px;color:#1a1a1a;resize:vertical;min-height:100px;outline:none;transition:border-color 0.2s;line-height:1.7;pointer-events:auto;cursor:text;user-select:text;-webkit-user-select:text;';
    ta.placeholder = '自由に書いてください...';
    ta.setAttribute('contenteditable', 'true');
    ta.style.userSelect = 'text';
    ta.style.webkitUserSelect = 'text';
    ta.style.pointerEvents = 'auto';
    ta.style.cursor = 'text';
    ta.value = answers[currentQ] || '';
    ta.oninput = () => {
      answers[currentQ] = ta.value;
      document.getElementById('btn-next').classList.toggle('ready', ta.value.trim().length > 0);
    };
    ta.onfocus = () => ta.style.borderColor = 'var(--accent)';
    ta.onblur = () => ta.style.borderColor = 'var(--border)';
    optsEl.appendChild(ta);
    if (answers[currentQ]) document.getElementById('btn-next').classList.add('ready');
    else document.getElementById('btn-next').classList.remove('ready');
  } else {
    const keys = ['A','B','C','D','E','F','G','H','I','J'];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      const sel = q.multi
        ? (Array.isArray(answers[currentQ]) && answers[currentQ].includes(i))
        : answers[currentQ] === i;
      btn.className = 'opt' + (sel ? ' sel' : '');
      btn.innerHTML = `<span class="opt-k">${keys[i]}</span><span>${opt}</span>`;
      btn.onclick = () => selectOpt(i);
      optsEl.appendChild(btn);
    });

    const nxt = document.getElementById('btn-next');
    const isLast = currentQ === total - 1;
    nxt.innerHTML = isLast
      ? `診断する <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
      : `次へ <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

    const hasAns = q.multi
      ? (Array.isArray(answers[currentQ]) && answers[currentQ].length > 0)
      : answers[currentQ] !== null;
    nxt.className = 'btn-next' + (hasAns ? ' ready' : '');
  }
}

function selectOpt(i) {
  const q = questions[currentQ];
  if (q.multi) {
    if (!Array.isArray(answers[currentQ])) answers[currentQ] = [];
    const idx = answers[currentQ].indexOf(i);
    if (idx === -1) answers[currentQ].push(i);
    else answers[currentQ].splice(idx, 1);
  } else {
    answers[currentQ] = i;
  }
  renderQ();
}

function nextQ() {
  const q = questions[currentQ];
  const hasAns = q.free
    ? (answers[currentQ] && answers[currentQ].trim().length > 0)
    : q.multi
      ? (Array.isArray(answers[currentQ]) && answers[currentQ].length > 0)
      : answers[currentQ] !== null;
  if (!hasAns) return;

  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQ();
  } else {
    runAnalysis();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

const LOAD_MSGS = [
  'あなたの価値観パターンを読み解いています',
  '思考スタイルと才能の傾向を分析中...',
  '適性のある職業を照合しています',
  '最適な学校・学部を検索しています',
  'パーソナルレポートを生成しています',
];

async function runAnalysis() {
  show('screen-loading');
  let mi = 0;
  const lsub = document.getElementById('load-sub');
  const timer = setInterval(() => {
    lsub.style.opacity = 0;
    setTimeout(() => { lsub.textContent = LOAD_MSGS[mi % LOAD_MSGS.length]; lsub.style.opacity = 1; mi++; }, 300);
  }, 2200);

  const summary = questions.map((q, i) => {
    let ans = '未回答';
    if (q.free) ans = answers[i] || '未回答';
    else if (q.multi && Array.isArray(answers[i])) ans = answers[i].map(idx => q.opts[idx]).join('、');
    else if (answers[i] !== null && answers[i] !== undefined) ans = q.opts[answers[i]];
    return `[${q.cat}] ${q.q}\n→ ${ans}`;
  }).join('\n\n');

  const stanceLabel = stance === 'adult' ? '社会人' : stance === 'university' ? '大学生' : '中高生';
  const targetLabel = [...TARGETS.career, ...TARGETS.school].find(t => t.id === target)?.label || '';

  const prompt = `以下はユーザーの診断回答です。

立場：${stanceLabel}
相談内容：${targetLabel}

${summary}

この回答をもとに、以下のJSON形式で深い分析結果を出力してください。
必ずJSON形式のみを出力し、前後に余計な文字・コードブロック記号は絶対に付けないでください。
結果は簡潔さより深さを重視してください。

{
  "personality_title": "このユーザーのタイプを表す印象的なキャッチコピー（例：「静かなる革命家」）",
  "personality_sub": "そのタイプを2〜3文で具体的に説明",
  "analysis": "価値観・思考スタイル・才能・課題・ライフスタイルを総合した深い分析（300〜400文字、具体的かつ個別的に。誰にでも当てはまる表現は避ける）",
  "traits": ["特性ワード1","特性ワード2","特性ワード3","特性ワード4","特性ワード5","特性ワード6"],
  "careers": [
    {"name":"職業名","note":"この人に合う具体的な理由（50〜80文字）","match":95},
    {"name":"職業名2","note":"理由","match":88},
    {"name":"職業名3","note":"理由","match":82},
    {"name":"職業名4","note":"理由","match":75},
    {"name":"職業名5","note":"理由","match":68}
  ],
  "thinking_direction": "この人が育てるべき思考力の方向性（100〜150文字。職業が変わっても残る本質的な力）",
  "universities": [
    {"name":"大学名","dept":"学部・学科名（具体的に）","reason":"推薦理由（40〜60文字）"},
    {"name":"大学名2","dept":"学部・学科名","reason":"理由"},
    {"name":"大学名3","dept":"学部・学科名","reason":"理由"},
    {"name":"大学名4","dept":"学部・学科名","reason":"理由"}
  ],
  "advice": "この人へのエールと具体的な行動へのアドバイス（150〜200文字）",
  "interview_opener": "面接官として最初に聞く深掘り質問（この人の回答を踏まえた具体的な質問。30〜50文字）"
}`;

  let result = null;
  let errorMsg = null;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    console.log('API response status:', res.status);
    if (data.error) {
      errorMsg = data.error.message || JSON.stringify(data.error);
      console.error('API error:', errorMsg);
    } else {
      const text = data.content.map(c => c.text || '').join('');
      console.log('Raw text length:', text.length);
      const clean = text.replace(/```json|```/g, '').trim();
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        result = JSON.parse(jsonMatch[0]);
      } else {
        result = JSON.parse(clean);
      }
    }
  } catch(e) {
    errorMsg = e.message;
    console.error('Error:', e);
  }

  clearInterval(timer);
  resultData = result;
  renderResult(result, errorMsg);
  show('screen-result');
}

/* ═══════════════════════════════
   RESULT
═══════════════════════════════ */
const UNI_ICONS = ['🏛️','📚','🔬','🎨','⚙️','💡','🌍','🩺'];

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderResult(r) {
  const el = document.getElementById('result-inner');
  if (!r) {
    el.innerHTML = `<div class="error-box">申し訳ありません。分析中にエラーが発生しました。もう一度お試しください。</div>
    <button class="btn-retry" onclick="startQuiz('${target}')">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>もう一度診断する</button>`;
    return;
  }

  el.innerHTML = `
    <div class="result-top">
      <div class="result-badge">✦ 診断完了</div>
      <div class="result-title">${esc(r.personality_title)}</div>
      <div class="result-sub">${esc(r.personality_sub)}</div>
    </div>

    <div class="rblock type-p">
      <div class="rblock-label"><span class="rl-dot dot-p"></span>パーソナリティ分析</div>
      <div class="analysis">${esc(r.analysis)}</div>
      <div class="traits">${(r.traits||[]).map(t=>`<span class="trait">${esc(t)}</span>`).join('')}</div>
    </div>

    <div class="rblock type-b">
      <div class="rblock-label"><span class="rl-dot dot-b"></span>あなたに向いている職業</div>
      <div class="career-list">
        ${(r.careers||[]).map((c,i)=>`
          <div class="career-row">
            <div class="career-num">${i+1}</div>
            <div class="career-body">
              <div class="career-name">${esc(c.name)}</div>
              <div class="career-note">${esc(c.note)}</div>
            </div>
            <div class="career-pct">${c.match}%</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="rblock type-p" style="border-left-color:var(--accent)">
      <div class="rblock-label"><span class="rl-dot dot-p"></span>育てるべき思考力の方向性</div>
      <div class="analysis">${esc(r.thinking_direction)}</div>
    </div>

    <div class="rblock type-g">
      <div class="rblock-label"><span class="rl-dot dot-g"></span>おすすめの学校・学部</div>
      <div class="uni-list">
        ${(r.universities||[]).map((u,i)=>`
          <div class="uni-row">
            <div class="uni-icon">${UNI_ICONS[i%UNI_ICONS.length]}</div>
            <div class="uni-body">
              <div class="uni-name">${esc(u.name)}</div>
              <div class="uni-dept">${esc(u.dept)}　／　${esc(u.reason)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="rblock type-o">
      <div class="rblock-label"><span class="rl-dot dot-o"></span>あなたへのメッセージ</div>
      <div class="advice-box">${esc(r.advice)}</div>
    </div>

    <button class="btn-interview" onclick="startInterview()">
      AIと深掘り面接をする →
    </button>

    <button class="btn-retry" onclick="showStance()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>
      最初からやり直す
    </button>`;
}

/* ═══════════════════════════════
   INTERVIEW
═══════════════════════════════ */
function startInterview() {
  ivHistory = [];
  ivTurnCount = 0;

  show('screen-interview');

  const opener = resultData?.interview_opener || 'あなたの回答を踏まえて、もう少し深く聞かせてください。';
  const summary = questions.map((q, i) => {
    let ans = '未回答';
    if (q.free) ans = answers[i] || '未回答';
    else if (q.multi && Array.isArray(answers[i])) ans = answers[i].map(idx => q.opts[idx]).join('、');
    else if (answers[i] !== null && answers[i] !== undefined) ans = q.opts[answers[i]];
    return `[${q.cat}] ${ans}`;
  }).join('\n');

  ivHistory.push({
    role: 'system',
    content: `あなたはキャリア・進路の面接官AIです。以下はユーザーの診断結果と回答サマリーです。

診断結果：${resultData?.personality_title || ''}
分析：${resultData?.analysis || ''}

回答サマリー：
${summary}

この情報をもとに、ユーザーの本音をさらに深く引き出してください。
・1回の返答につき1〜2つの質問のみ
・共感しながらも鋭く深掘りする
・「なぜ」「どんな場面で」「具体的には」を意識する
・診断結果に矛盾する点があれば優しく指摘する
・${MAX_IV_TURNS}回のやり取りで終了し、最後に総合的なフィードバックを伝える
・日本語で返答する`
  });

  addAIMsg(opener, true);

  document.getElementById('iv-input').addEventListener('input', () => {
    const val = document.getElementById('iv-input').value.trim();
    document.getElementById('iv-send').disabled = val.length === 0;
  });
}

function addAIMsg(text, isFirst = false) {
  const msgs = document.getElementById('iv-messages');

  if (!isFirst) {
    // typing indicator
    const typing = document.createElement('div');
    typing.className = 'msg msg-ai';
    typing.id = 'typing-indicator';
    typing.innerHTML = `
      <div class="msg-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="msg-typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    setTimeout(() => {
      const ti = document.getElementById('typing-indicator');
      if (ti) ti.remove();
      appendAIBubble(text, msgs);
    }, 1200);
  } else {
    appendAIBubble(text, msgs);
  }
}

function appendAIBubble(text, msgs) {
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.innerHTML = `
    <div class="msg-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
    <div class="msg-bubble">${esc(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;

  ivHistory.push({ role: 'assistant', content: text });
}

function addUserMsg(text) {
  const msgs = document.getElementById('iv-messages');
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `
    <div class="msg-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
    <div class="msg-bubble">${esc(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  ivHistory.push({ role: 'user', content: text });
}

async function sendMessage() {
  const input = document.getElementById('iv-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('iv-send').disabled = true;
  input.disabled = true;

  addUserMsg(text);
  ivTurnCount++;

  const isLast = ivTurnCount >= MAX_IV_TURNS;
  const systemMsg = isLast
    ? ivHistory[0].content + '\n\nこれが最後のやり取りです。総合的なフィードバックと、具体的な次のアクションを伝えてください。'
    : ivHistory[0].content;

  try {
    const messages = ivHistory.filter(m => m.role !== 'system').map(m => ({
      role: m.role,
      content: m.content
    }));

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: systemMsg,
        messages
      })
    });
    const data = await res.json();
    const reply = data.content.map(c => c.text || '').join('');
    addAIMsg(reply);

    if (isLast) {
      setTimeout(() => {
        const msgs = document.getElementById('iv-messages');
        const end = document.createElement('div');
        end.style.cssText = 'text-align:center;padding:24px 0;font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;color:var(--ink-dim)';
        end.textContent = '— INTERVIEW COMPLETE —';
        msgs.appendChild(end);

        const backBtn = document.createElement('button');
        backBtn.style.cssText = 'display:block;margin:0 auto 24px;padding:12px 32px;background:var(--accent);color:var(--bg);border:none;border-radius:100px;font-family:\'Zen Kaku Gothic New\',sans-serif;font-size:14px;font-weight:700;cursor:pointer';
        backBtn.textContent = '結果に戻る';
        backBtn.onclick = () => show('screen-result');
        msgs.appendChild(backBtn);
        msgs.scrollTop = msgs.scrollHeight;
      }, 2000);
      input.disabled = true;
      document.getElementById('iv-send').disabled = true;
      return;
    }
  } catch(e) {
    console.error(e);
    addAIMsg('申し訳ありません。エラーが発生しました。もう一度お試しください。');
  }

  input.disabled = false;
  input.focus();
}

function ivKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
</script>
