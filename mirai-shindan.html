<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アナタノミライハ</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0504AA;
  --black: #0a0a0a;
  --border: rgba(0,0,0,0.13);
  --border-sel: #0504AA;
  --bg-sel: rgba(5,4,170,0.05);
  --muted: #aaa;
  --r: 16px;
  --grid: rgba(5,4,170,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #fff;
  color: var(--black);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; }

/* ── SCREEN SWITCH ── */
.screen { display: none; }
.screen.active { display: block; }

/* ==================== PASSWORD ==================== */
#screen-password {
  min-height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
#screen-password.active { display: flex; }

.pw-logo {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(3rem, 11vw, 6rem);
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 36px;
}
.pw-logo .blue { color: var(--blue); }
.pw-logo .blk  { color: var(--black); }

.pw-note {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 28px;
  letter-spacing: 0.04em;
}

.pw-field {
  width: 100%;
  max-width: 560px;
  padding: 18px 24px;
  border: 1.5px solid var(--black);
  border-radius: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  text-align: center;
  letter-spacing: 0.12em;
  outline: none;
  background: rgba(255,255,255,0.9);
  transition: border-color 0.2s;
  margin-bottom: 20px;
}
.pw-field:focus { border-color: var(--blue); }
.pw-field::placeholder { color: var(--muted); letter-spacing: 0.04em; }

.pw-btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 16px 52px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: opacity 0.2s, transform 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.pw-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.pw-error {
  color: #c0392b;
  font-size: 0.82rem;
  margin-top: 12px;
  display: none;
}

/* ==================== TOP ==================== */
#screen-top {
  max-width: 720px;
  margin: 0 auto;
  padding: 64px 24px 80px;
}

.top-heading {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 900;
  line-height: 1.25;
  margin-bottom: 8px;
  color: var(--black);
}

.top-sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 28px;
  letter-spacing: 0.04em;
}

/* 立場：一行タブ（見出しなし） */
.type-tab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.type-tab {
  padding: 7px 20px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: rgba(255,255,255,0.8);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: #666;
}
.type-tab:hover { border-color: var(--blue); color: var(--blue); }
.type-tab.sel {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  font-weight: 700;
}

.concern-cat-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.concern-cat-label + .concern-cat-label { margin-top: 24px; }

.concern-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  background: rgba(255,255,255,0.85);
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
  text-align: left;
  font-family: 'Noto Sans JP', sans-serif;
}
.concern-item:hover {
  border-color: var(--blue);
  background: var(--bg-sel);
  transform: translateX(3px);
}
.concern-item.sel {
  border-color: var(--border-sel);
  border-width: 2px;
  background: var(--bg-sel);
  box-shadow: 0 0 0 3px rgba(5,4,170,0.08);
}

.concern-text {
  font-size: 1rem;
  font-weight: 500;
  color: var(--black);
}
.concern-item.sel .concern-text { font-weight: 700; color: var(--blue); }

.concern-arrow {
  color: var(--blue);
  font-size: 1rem;
  flex-shrink: 0;
  margin-left: 16px;
  transition: transform 0.18s;
}
.concern-item:hover .concern-arrow,
.concern-item.sel .concern-arrow { transform: translateX(4px); }

.start-wrap { margin-top: 36px; text-align: center; }

.start-btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 16px 56px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.15s;
  display: none;
  align-items: center;
  gap: 10px;
}
.start-btn.visible { display: inline-flex; }
.start-btn:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(5,4,170,0.25); }

/* ==================== QUESTION ==================== */
#screen-question {
  max-width: 720px;
  margin: 0 auto;
  padding: 56px 24px 80px;
}

.progress-wrap { margin-bottom: 32px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.progress-bar { height: 3px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.q-cat-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--blue);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.q-heading {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(1.3rem, 4vw, 2rem);
  font-weight: 700;
  line-height: 1.6;
  margin-bottom: 32px;
  color: var(--black);
}

.opts { display: flex; flex-direction: column; gap: 10px; }

.opt {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  background: rgba(255,255,255,0.85);
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--black);
}
.opt:hover { border-color: var(--blue); background: var(--bg-sel); }
.opt.sel {
  border-color: var(--border-sel);
  border-width: 2px;
  background: var(--bg-sel);
  font-weight: 600;
  color: var(--blue);
  box-shadow: 0 0 0 3px rgba(5,4,170,0.07);
}
.opt-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  margin-left: 12px;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.opt.sel .opt-check { background: var(--blue); border-color: var(--blue); }
.opt.sel .opt-check::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; }

.q-textarea {
  width: 100%;
  min-height: 110px;
  padding: 16px 20px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem;
  line-height: 1.65;
  outline: none;
  resize: vertical;
  background: rgba(255,255,255,0.85);
  transition: border-color 0.2s;
  color: var(--black);
}
.q-textarea:focus { border-color: var(--blue); background: #fff; }

.slider-wrap { padding: 4px 0; }
.slider-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 10px; }
input[type="range"] { width: 100%; accent-color: var(--blue); cursor: pointer; }
.slider-val { text-align: center; font-size: 1.4rem; font-weight: 700; color: var(--blue); margin-top: 10px; }

.multi-opts { display: flex; flex-direction: column; gap: 10px; }
.multi-opt {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  background: rgba(255,255,255,0.85);
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--black);
  text-align: left;
  width: 100%;
}
.multi-opt:hover { border-color: var(--blue); background: var(--bg-sel); }
.multi-opt.sel { border-color: var(--border-sel); border-width: 2px; background: var(--bg-sel); font-weight: 600; color: var(--blue); }
.multi-box {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.multi-opt.sel .multi-box { background: var(--blue); border-color: var(--blue); }
.multi-opt.sel .multi-box::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

.q-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 36px;
  gap: 12px;
}
.nav-btn {
  padding: 13px 28px;
  border-radius: 999px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.nav-back { background: transparent; border: 1.5px solid var(--border); color: #666; }
.nav-back:hover { border-color: var(--black); color: var(--black); }
.nav-next { background: var(--blue); border: none; color: #fff; flex: 1; max-width: 260px; }
.nav-next:hover { opacity: 0.88; transform: translateY(-1px); }
.nav-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ==================== API KEY ==================== */
#screen-apikey {
  max-width: 620px;
  margin: 0 auto;
  padding: 80px 24px;
  text-align: center;
}

.api-heading {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  margin-bottom: 12px;
}
.api-desc { font-size: 0.9rem; color: #666; line-height: 1.7; margin-bottom: 28px; }

.api-field-wrap { position: relative; margin-bottom: 10px; }
.api-field {
  width: 100%;
  padding: 16px 48px 16px 20px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem;
  outline: none;
  background: rgba(255,255,255,0.9);
  transition: border-color 0.2s;
}
.api-field:focus { border-color: var(--blue); }
.api-eye {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; color: var(--muted); font-size: 1rem; padding: 4px;
}
.api-note-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.api-error-msg { color: #c0392b; font-size: 0.82rem; margin-bottom: 14px; display: none; }
.api-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.api-back-btn {
  padding: 13px 28px; border-radius: 999px; border: 1.5px solid var(--border);
  background: transparent; font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; color: #666; transition: all 0.15s;
}
.api-back-btn:hover { border-color: var(--black); color: var(--black); }
.api-go-btn {
  padding: 13px 40px; border-radius: 999px; border: none; background: var(--blue);
  color: #fff; font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.api-go-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* ==================== RESULT ==================== */
#screen-result {
  max-width: 720px;
  margin: 0 auto;
  padding: 56px 24px 80px;
}

.result-loading { text-align: center; padding: 80px 20px; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(5,4,170,0.12);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.9rem; color: var(--muted); animation: blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.5} 50%{opacity:1} }

.result-badge {
  display: inline-block;
  background: var(--blue); color: #fff;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.12em; padding: 5px 14px;
  border-radius: 999px; margin-bottom: 14px;
}
.result-main-title {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-weight: 900; line-height: 1.4;
  margin-bottom: 32px; color: var(--black);
}

.r-section { margin-bottom: 28px; }
.r-section-label {
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.14em; color: var(--blue);
  text-transform: uppercase; margin-bottom: 10px;
}
.r-text { font-size: 0.95rem; line-height: 1.8; color: #333; white-space: pre-wrap; }
.r-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.r-tag {
  background: rgba(5,4,170,0.07); color: var(--blue);
  font-size: 0.82rem; font-weight: 600;
  padding: 7px 16px; border-radius: 999px;
  border: 1px solid rgba(5,4,170,0.15);
}
.r-divider { height: 1px; background: rgba(0,0,0,0.07); margin: 28px 0; }

.result-actions {
  display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap; margin-top: 40px;
}
.r-restart {
  padding: 13px 28px; border-radius: 999px; border: 1.5px solid var(--border);
  background: transparent; font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; color: #666; transition: all 0.15s;
}
.r-restart:hover { border-color: var(--black); color: var(--black); }
.r-print {
  padding: 13px 32px; border-radius: 999px; border: none; background: var(--blue);
  color: #fff; font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.r-print:hover { opacity: 0.88; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.4s ease both; }

@media print {
  body::before { display: none; }
  .result-actions { display: none; }
}
</style>
</head>
<body>
<div class="app">

<!-- PASSWORD -->
<div id="screen-password" class="active">
  <div class="pw-logo">
    <span class="blue">アナタ</span><span class="blk">ノ</span><span class="blue">ミライ</span><span class="blk">ハ</span>
  </div>
  <p class="pw-note">このサービスはパスワードが必要です</p>
  <input type="password" id="pw-input" class="pw-field" placeholder="パスワードを入力" />
  <div>
    <button class="pw-btn" onclick="checkPw()">入る <span>→</span></button>
  </div>
  <div class="pw-error" id="pw-error">パスワードが違います</div>
</div>

<!-- TOP -->
<div id="screen-top" class="screen">
  <div class="fade-in">
    <div class="top-heading">今のあなたに近いのは？</div>
    <div class="top-sub">一番しっくりくるものを選んでください</div>

    <!-- 立場：見出しなし、一行タブのみ -->
    <div class="type-tab-row">
      <button class="type-tab" onclick="selectType(this,'中高生')">中高生</button>
      <button class="type-tab" onclick="selectType(this,'大学生')">大学生</button>
      <button class="type-tab" onclick="selectType(this,'社会人')">社会人</button>
    </div>

    <div class="concern-cat-label">職業を探している</div>
    <div id="concerns-work"></div>

    <div class="concern-cat-label" style="margin-top:20px">学校・学部を探している</div>
    <div id="concerns-school"></div>

    <div class="start-wrap">
      <button class="start-btn" id="start-btn" onclick="startDiagnosis()">診断スタート →</button>
    </div>
  </div>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="q-label">質問 1 / 12</span>
      <span id="q-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="q-fill" style="width:0%"></div></div>
  </div>
  <div class="q-cat-label" id="q-cat"></div>
  <div class="q-heading" id="q-text"></div>
  <div id="q-opts"></div>
  <div class="q-nav">
    <button class="nav-btn nav-back" id="btn-prev" onclick="prevQ()">← 戻る</button>
    <button class="nav-btn nav-next" id="btn-next" onclick="nextQ()" disabled>次へ →</button>
  </div>
</div>

<!-- API KEY -->
<div id="screen-apikey" class="screen">
  <div class="api-heading">AI分析を開始します</div>
  <div class="api-desc">Anthropic APIキーを入力してください。<br>あなたの回答をもとに、未来の方向性を提案します。</div>
  <div class="api-field-wrap">
    <input type="password" class="api-field" id="api-input" placeholder="sk-ant-..." />
    <button class="api-eye" onclick="toggleEye()">👁</button>
  </div>
  <div class="api-note-text">APIキーはブラウザ外に送信されません</div>
  <div class="api-error-msg" id="api-error"></div>
  <div class="api-btns">
    <button class="api-back-btn" onclick="apiBack()">← 戻る</button>
    <button class="api-go-btn" onclick="runAnalysis()">分析開始 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div id="result-loading" class="result-loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-msg">あなたの回答を分析中...</div>
  </div>
  <div id="result-body" style="display:none">
    <div style="text-align:center;margin-bottom:8px">
      <span class="result-badge">AI診断レポート</span>
    </div>
    <div class="result-main-title" id="r-title"></div>
    <div id="r-sections"></div>
    <div class="result-actions">
      <button class="r-restart" onclick="restartAll()">最初からやり直す</button>
      <button class="r-print" onclick="window.print()">📄 結果を保存</button>
    </div>
  </div>
</div>

</div>

<script>
const PASSWORD = "MIRAI SHINDAN";

const CONCERNS = [
  { id:1, title:"体のことが心配で、将来が不安",    group:"work"   },
  { id:2, title:"このままでいいのか、わからない",   group:"work"   },
  { id:3, title:"転職したい。でも踏み出せない",     group:"work"   },
  { id:4, title:"この転職先、あってる？",           group:"work"   },
  { id:5, title:"自分に合う仕事って、なんだろう？", group:"work"   },
  { id:6, title:"好きなことが、見つからない",       group:"school" },
  { id:7, title:"学部・大学、どこがいいんだろう？", group:"school" },
];

const QUESTION_BANK = {
  A1: [
    { q:"部活や趣味で、時間を忘れて没頭したことがある。そのとき何をしていた？", type:"text" },
    { q:"友達に「これ知ってる？」と話したくなるのは、どんなジャンルの話？", type:"choice", opts:["科学・テクノロジー","アート・デザイン","人・社会のこと","自然・生き物","ビジネス・お金","その他"] },
    { q:"本屋に1時間いられるとしたら、自然と立ち寄るコーナーはどこ？", type:"choice", opts:["技術・IT","文学・エッセイ","ビジネス・自己啓発","アート・写真集","医療・健康","その他"] },
  ],
  A3: [
    { q:"グループ作業で、自分と全く同じ意見の人がいた。どう感じる？", type:"choice", opts:["嬉しい、心強い","少し物足りない","むしろ独自意見を出したくなる","状況による"] },
    { q:"あなたが一番「自分らしい」と感じる瞬間は？", type:"choice", opts:["何かを一から作っているとき","人に認められたとき","誰かと深く話しているとき","一人で黙々と取り組んでいるとき"] },
  ],
  A4: [
    { q:"友達に何かを教えたあと、どう感じる？", type:"choice", opts:["すごく満足する","普通、当然のこと","少し疲れる","もっと教えたくなる"] },
    { q:"もし見知らぬ人が困っていたら？", type:"choice", opts:["自然と声をかける","声をかけたいが躊躇う","状況次第","基本は見守る"] },
  ],
  A5: [
    { q:"頑張ったプロジェクトが成功した。一番嬉しかった瞬間は？", type:"choice", opts:["チームで喜び合えたこと","自分の成長を実感したこと","誰かに感謝されたこと","目標を達成できたこと"] },
    { q:"10年後、どんな人間でいたいか一言で表すとしたら？", type:"text" },
  ],
  B: [
    { q:"締め切りギリギリに最高のパフォーマンスを出すタイプ？それとも余裕を持って仕上げるタイプ？", type:"choice", opts:["ギリギリ派","余裕派","どちらでもない"] },
    { q:"初めての仕事・課題に取り組むとき、まず何をする？", type:"choice", opts:["全体像を把握してから始める","とりあえず手を動かす","誰かに聞く","ネットで調べる"] },
    { q:"感情と論理、どちらで決断することが多い？", type:"choice", opts:["感情重視","論理重視","半々","状況による"] },
  ],
  C: [
    { q:"今の自分が抱えている制約で一番大きいものは？", type:"choice", opts:["時間","お金","場所・環境","人間関係","体力・健康","その他"] },
    { q:"1年後に実現したい変化として現実的なものは？", type:"choice", opts:["職種を変える","働き方を変える","勉強・資格取得","環境を変える（引越し等）","今のポジションで深める"] },
  ],
  D: [
    { q:"理想の一日のペースは？", type:"choice", opts:["朝型・早起き","夜型・夜更かし","フレキシブル","決まった生活リズムが好き"] },
    { q:"仕事・勉強のパフォーマンスが最も高い時間帯は？", type:"slider", min:6, max:24, step:1, label:"時頃", default:10 },
    { q:"1週間の中で、自分のための自由な時間はどのくらい欲しい？", type:"choice", opts:["1〜2時間/週","半日/週","1日以上/週","できるだけ多く"] },
  ],
  E: [
    { q:"「これだけは自信がある」と言えるスキルや能力は？（複数可）", type:"multicheck", opts:["コミュニケーション","分析・論理思考","クリエイティブ","技術・IT","マネジメント","教える・伝える"] },
    { q:"過去に「もっとやりたかった」と思った仕事・活動は？", type:"text" },
  ],
  G: [
    { q:"5年後、どこに向かいたいか想像したとき、どう感じる？", type:"choice", opts:["ワクワクする","少し不安","よくわからない","むしろ今に集中したい"] },
    { q:"理想の未来へ向けて、今すぐ始められることは？", type:"text" },
  ],
  H1: [
    { q:"もうやめようと思った。それでも続けた。なぜ？", type:"choice", opts:["目標・夢があったから","誰かのためになるから","諦めたくなかったから","惰性・他に選択肢がなかったから"] },
    { q:"あなたを一番突き動かすものは？", type:"choice", opts:["承認・評価されたい","誰かの役に立ちたい","自己成長・スキルアップ","安心・安定したい","世の中を変えたい"] },
  ],
  H2: [
    { q:"「これ以上は無理」と感じるのはどんなとき？", type:"choice", opts:["価値観に反することをするとき","体力・健康的に限界のとき","評価されないとき","人間関係が崩れたとき","意味を感じられないとき"] },
  ],
  I: [
    { q:"お世話になった職場を離れることになった。しかもその翌日、3日間限定応募の天職を見つけた。どうする？", type:"choice", opts:["すぐ応募する","少し様子を見てから考える","周りに相談する","今は動けない"] },
  ],
  J: [
    { q:"2日前に直接指導した資料に重大な抜けがあった。部下はまだ気づいていない。どうする？", type:"choice", opts:["すぐ自分で修正して報告する","部下に気づかせてから一緒に直す","上司に先に報告する","締め切りを確認してから判断する"] },
  ],
  K: [
    { q:"新しい仕事を任された。上司は忙しそうだ。どうする？", type:"choice", opts:["自分でとにかく調べる","まず同僚に聞く","要点をまとめて上司に確認する","少し様子を見てから動く"] },
  ],
};

const SCENARIO_CONFIGS = {
  1: { cats:{ B:2, C:2, D:2, H1:1, H2:1, I:1, J:1, K:1, A1:1, A5:1 } },
  2: { cats:{ A1:2, A5:2, B:2, D:1, E:2, G:2, H1:1, H2:1 } },
  3: { cats:{ A5:2, B:1, D:1, E:1, G:2, H1:2, H2:2, I:1, J:1 } },
  4: { cats:{ A1:1, A5:2, B:2, D:1, E:2, G:2, H1:1, H2:1, I:1, K:1 } },
  5: { cats:{ A1:2, A3:1, A4:1, A5:2, B:2, D:1, E:2, G:2, H1:1 } },
  6: { cats:{ A1:3, A3:2, A4:1, A5:2, B:1, E:2, G:2 } },
  7: { cats:{ A1:3, A3:1, A4:1, A5:2, B:2, D:1, E:2, G:2 } },
};

const CAT_LABELS = {
  A1:'価値観 — 興味・関心', A3:'価値観 — 独自性', A4:'価値観 — 貢献',
  A5:'価値観 — 存在意義', B:'思考・行動パターン', C:'制約・環境',
  D:'ライフスタイル', E:'得意・情熱', G:'未来志向',
  H1:'原動力', H2:'限界点', I:'決断力', J:'対応力', K:'自律的思考',
};

let S = { concern:null, userType:null, questions:[], currentQ:0, answers:[], apiKey:'' };

/* ── SCREENS ── */
function showScreen(id) {
  document.getElementById('screen-password').style.display = 'none';
  ['screen-top','screen-question','screen-apikey','screen-result'].forEach(s =>
    document.getElementById(s).classList.remove('active')
  );
  if (id === 'screen-password') {
    document.getElementById('screen-password').style.display = 'flex';
  } else {
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top:0, behavior:'smooth' });
  }
}

/* ── PASSWORD ── */
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') checkPw(); });

function checkPw() {
  if (document.getElementById('pw-input').value.trim() === PASSWORD) {
    renderConcerns();
    showScreen('screen-top');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

/* ── TOP ── */
function renderConcerns() {
  ['work','school'].forEach(g => {
    const el = document.getElementById('concerns-' + g);
    el.innerHTML = '';
    CONCERNS.filter(c => c.group === g).forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'concern-item';
      btn.dataset.id = c.id;
      btn.innerHTML = `<span class="concern-text">${c.title}</span><span class="concern-arrow">→</span>`;
      btn.onclick = () => selectConcern(c.id, btn);
      el.appendChild(btn);
    });
  });
}

function selectType(btn, type) {
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  S.userType = type;
  checkReady();
}

function selectConcern(id, el) {
  document.querySelectorAll('.concern-item').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  S.concern = id;
  checkReady();
}

function checkReady() {
  const btn = document.getElementById('start-btn');
  if (S.concern && S.userType) btn.classList.add('visible');
}

/* ── QUESTIONS ── */
function buildQuestions() {
  const config = SCENARIO_CONFIGS[S.concern];
  const qs = [];
  for (const [cat, count] of Object.entries(config.cats)) {
    const pool = [...(QUESTION_BANK[cat]||[])].sort(()=>Math.random()-0.5);
    for (let i=0; i<Math.min(count,pool.length); i++) qs.push({...pool[i], category:cat});
  }
  return qs;
}

function startDiagnosis() {
  S.questions = buildQuestions();
  S.currentQ = 0;
  S.answers = new Array(S.questions.length).fill(null);
  showScreen('screen-question');
  renderQ();
}

function renderQ() {
  const q = S.questions[S.currentQ];
  const total = S.questions.length;
  const pct = Math.round((S.currentQ / total) * 100);

  document.getElementById('q-label').textContent = `質問 ${S.currentQ+1} / ${total}`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('q-fill').style.width = pct + '%';
  document.getElementById('q-cat').textContent = CAT_LABELS[q.category] || q.category;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('btn-prev').style.visibility = S.currentQ === 0 ? 'hidden' : 'visible';

  const saved = S.answers[S.currentQ];
  const container = document.getElementById('q-opts');
  container.innerHTML = '';

  if (q.type === 'choice') {
    const div = document.createElement('div');
    div.className = 'opts';
    q.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt' + (saved === opt ? ' sel' : '');
      btn.innerHTML = `<span>${opt}</span><span class="opt-check"></span>`;
      btn.onclick = () => {
        div.querySelectorAll('.opt').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
        S.answers[S.currentQ] = opt;
        enableNext(true);
      };
      div.appendChild(btn);
    });
    container.appendChild(div);
    enableNext(!!saved);

  } else if (q.type === 'multicheck') {
    const div = document.createElement('div');
    div.className = 'multi-opts';
    const sel = saved ? [...saved] : [];
    q.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'multi-opt' + (sel.includes(opt) ? ' sel' : '');
      btn.innerHTML = `<span class="multi-box"></span><span>${opt}</span>`;
      btn.onclick = () => {
        const i = sel.indexOf(opt);
        if (i>=0) { sel.splice(i,1); btn.classList.remove('sel'); }
        else { sel.push(opt); btn.classList.add('sel'); }
        S.answers[S.currentQ] = [...sel];
        enableNext(sel.length > 0);
      };
      div.appendChild(btn);
    });
    container.appendChild(div);
    enableNext(sel.length > 0);

  } else if (q.type === 'slider') {
    const cur = saved != null ? saved : (q.default || Math.floor((q.min+q.max)/2));
    const wrap = document.createElement('div');
    wrap.className = 'slider-wrap';
    wrap.innerHTML = `
      <div class="slider-labels"><span>${q.min}時</span><span>${q.max}時</span></div>
      <input type="range" min="${q.min}" max="${q.max}" step="${q.step||1}" value="${cur}" id="sl">
      <div class="slider-val" id="slv">${cur}${q.label||''}</div>`;
    container.appendChild(wrap);
    const sl = document.getElementById('sl');
    sl.oninput = () => {
      document.getElementById('slv').textContent = sl.value + (q.label||'');
      S.answers[S.currentQ] = parseInt(sl.value);
    };
    S.answers[S.currentQ] = cur;
    enableNext(true);

  } else if (q.type === 'text') {
    const ta = document.createElement('textarea');
    ta.className = 'q-textarea';
    ta.placeholder = '自由に書いてください（数文字でもOK）';
    ta.value = saved || '';
    ta.oninput = () => {
      S.answers[S.currentQ] = ta.value;
      enableNext(ta.value.trim().length > 0);
    };
    container.appendChild(ta);
    enableNext(saved && saved.trim().length > 0);
  }

  const isLast = S.currentQ === S.questions.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '分析へ →' : '次へ →';
}

function enableNext(v) { document.getElementById('btn-next').disabled = !v; }

function nextQ() {
  if (S.currentQ < S.questions.length - 1) { S.currentQ++; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); }
  else showScreen('screen-apikey');
}
function prevQ() {
  if (S.currentQ > 0) { S.currentQ--; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); }
}

/* ── API KEY ── */
function toggleEye() {
  const inp = document.getElementById('api-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function apiBack() { showScreen('screen-question'); S.currentQ = S.questions.length-1; renderQ(); }

/* ── ANALYSIS ── */
async function runAnalysis() {
  const key = document.getElementById('api-input').value.trim();
  const errEl = document.getElementById('api-error');
  if (!key.startsWith('sk-ant-')) {
    errEl.textContent = 'APIキーは sk-ant- で始まります';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  S.apiKey = key;

  showScreen('screen-result');
  document.getElementById('result-loading').style.display = 'block';
  document.getElementById('result-body').style.display = 'none';

  const concern = CONCERNS.find(c => c.id === S.concern);
  const qaSummary = S.questions.map((q,i) => {
    const a = S.answers[i];
    const ans = Array.isArray(a) ? a.join('・') : (a != null ? String(a) : '未回答');
    return `[${CAT_LABELS[q.category]||q.category}] ${q.q}\n→ ${ans}`;
  }).join('\n\n');

  const prompt = `あなたはキャリア・進路の専門家AIアドバイザーです。以下のユーザー情報と診断回答をもとに、具体的で温かみのある未来提案レポートを日本語で書いてください。

【ユーザー情報】
立場: ${S.userType}
相談テーマ: ${concern?.title || ''}

【診断回答】
${qaSummary}

【出力形式（必ずこの順で）】
## あなたのコアタイプ（一行タイトル）

## 診断サマリー
あなたの回答から見えてくる本質的な特徴・傾向を率直に3〜4文で伝える。

## あなたの強み
箇条書きで3〜5項目（各項目は「- 」で始める）

## 向いている方向性
職業系なら具体的な職種・業界、大学系なら学部・分野を3〜5例。各1〜2行で理由も添える。箇条書き「- 」

## 次の一歩
今週中にできる具体的なアクションを2〜3つ。箇条書き「- 」

## あなたへのメッセージ
100文字以内の励ましの言葉。`;

  const msgs = ["あなたの回答を分析中...","傾向を読み解いています...","未来の方向性を考えています...","レポートを生成中..."];
  let mi = 0;
  const iv = setInterval(() => {
    const el = document.getElementById('loading-msg');
    if (el) el.textContent = msgs[mi++ % msgs.length];
  }, 2000);

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": S.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1500,
        messages: [{ role:"user", content: prompt }],
      })
    });
    clearInterval(iv);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `APIエラー ${res.status}`);
    }

    const data = await res.json();
    const text = data.content.map(b => b.text||'').join('');
    renderResult(text);

  } catch(e) {
    clearInterval(iv);
    document.getElementById('result-loading').innerHTML = `
      <div style="text-align:center">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <div style="font-weight:700;margin-bottom:8px">エラーが発生しました</div>
        <div style="font-size:0.85rem;color:#aaa;margin-bottom:20px">${e.message}</div>
        <button class="api-back-btn" onclick="showScreen('screen-apikey')">再入力する</button>
      </div>`;
  }
}

/* ── RESULT ── */
function renderResult(md) {
  document.getElementById('result-loading').style.display = 'none';
  document.getElementById('result-body').style.display = 'block';

  const sections = [];
  let cur = null;
  md.split('\n').forEach(l => {
    if (l.startsWith('## ')) {
      if (cur) sections.push(cur);
      cur = { title: l.replace('## ','').trim(), lines: [] };
    } else if (cur) cur.lines.push(l);
  });
  if (cur) sections.push(cur);

  if (!sections.length) {
    document.getElementById('r-title').textContent = '診断結果';
    document.getElementById('r-sections').innerHTML = `<div class="r-text">${md}</div>`;
    return;
  }

  document.getElementById('r-title').textContent = sections[0].title;
  const container = document.getElementById('r-sections');
  container.innerHTML = '';

  sections.slice(1).forEach((sec, idx) => {
    const raw = sec.lines.join('\n').trim();
    const isList = sec.lines.some(l => l.match(/^- /));
    const isLast = idx === sections.length - 2;

    const div = document.createElement('div');
    div.className = 'r-section fade-in';
    div.style.animationDelay = (idx * 0.08) + 's';

    const label = document.createElement('div');
    label.className = 'r-section-label';
    label.textContent = sec.title;
    div.appendChild(label);

    if (isList) {
      const tags = document.createElement('div');
      tags.className = 'r-tags';
      sec.lines.filter(l => l.match(/^- /)).forEach(l => {
        const span = document.createElement('span');
        span.className = 'r-tag';
        span.textContent = l.replace(/^- /,'').trim();
        tags.appendChild(span);
      });
      div.appendChild(tags);
    } else {
      const p = document.createElement('div');
      p.className = 'r-text';
      p.textContent = raw;
      div.appendChild(p);
    }

    if (!isLast) {
      const hr = document.createElement('div');
      hr.className = 'r-divider';
      div.appendChild(hr);
    }

    container.appendChild(div);
  });
}

/* ── RESTART ── */
function restartAll() {
  S = { concern:null, userType:null, questions:[], currentQ:0, answers:[], apiKey:'' };
  document.querySelectorAll('.concern-item').forEach(b => b.classList.remove('sel'));
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('sel'));
  document.getElementById('start-btn').classList.remove('visible');
  document.getElementById('api-input').value = '';
  document.getElementById('api-error').style.display = 'none';
  document.getElementById('result-loading').style.display = 'block';
  document.getElementById('result-loading').innerHTML = `<div class="spinner"></div><div class="loading-text" id="loading-msg">あなたの回答を分析中...</div>`;
  document.getElementById('result-body').style.display = 'none';
  renderConcerns();
  showScreen('screen-top');
}
</script>
